trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

steps:

- task: Docker@2
  displayName: 'Build and Push Docker Image to DockerHub'
  inputs:
    containerRegistry: 'Rynopay DockerHub'
    repository: 'rynopay/client_site'
    command: 'buildAndPush'
    Dockerfile: '**/dockerfile'
    tags: 'dev'